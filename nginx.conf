# webp content-negotiation: pick a .webp sibling when the browser accepts it
map $http_accept $webp_suffix {
    default "";
    "~*webp" ".webp";
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # gzip (active fallback — always on)
    gzip on;
    gzip_vary on;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/xml;
    gzip_min_length 1024;

    # brotli (~7-8% smaller than gzip on JS/CSS for browsers sending `br`).
    # DISABLED by default: this image installs nginx via `apk add nginx` on
    # node:20-alpine, and that package does NOT ship the brotli module .so —
    # nginx is compiled `--add-dynamic-module=.../ngx_brotli` but the module
    # lives in a SEPARATE Alpine package. A bare `brotli on;` here fails
    # `nginx -t` with `unknown directive "brotli"` and the container won't
    # start. gzip above already covers every br-capable browser, so this is a
    # pure margin optimization, not a correctness fix.
    #
    # TO ENABLE brotli (two parts — module install in the Dockerfile, then
    # uncomment here):
    #   1) In the runtime stage of the root Dockerfile, install the module
    #      package from the Alpine community repo and load it, e.g.:
    #        RUN apk add --no-cache nginx-mod-http-brotli
    #      then load it at the top level of nginx config (the `http {}` block,
    #      via http.d include order — Coolify mounts this file inside http{}),
    #      with the matching `load_module` lines in /etc/nginx/nginx.conf:
    #        load_module modules/ngx_http_brotli_filter_module.so;
    #        load_module modules/ngx_http_brotli_static_module.so;
    #      (Verify the exact package name/path on the pinned base image first —
    #      `apk add nginx-mod-http-brotli` may require `--repository .../community`.)
    #   2) Uncomment the directives below. brotli_static serves precompiled
    #      .br siblings when present; brotli compresses dynamically otherwise.
    # brotli on;
    # brotli_static on;
    # brotli_comp_level 5;
    # brotli_min_length 1024;
    # brotli_types text/plain text/css application/javascript application/json image/svg+xml application/xml application/xml+rss application/wasm font/woff2;

    # security headers (repeat inside any location that sets its own add_header)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # CSP note — `style-src 'unsafe-inline'` is INTENTIONAL and accepted (style-only).
    # The React/Vite app renders dynamic inline `style` attributes that cannot be
    # precomputed into a stylesheet or carry a nonce/hash: JS-driven CSS custom
    # properties (--reveal-delay, rail --progress, the animated nav indicator
    # --ind-left/--ind-width) and per-element `view-transition-name`. Inline STYLE
    # ATTRIBUTES are not coverable by 'nonce-…'/hashes (those only apply to <style>
    # elements), so removing 'unsafe-inline' here would break reveal animations,
    # the nav indicator, rail progress, and view transitions. This is defense in
    # depth, not an open hole: script-src stays strict ('self' + named origins,
    # NO 'unsafe-inline'/'unsafe-eval'), which is the directive that matters for XSS.
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https://*.contentsquare.net https://*.contentsquare.com https://*.clarity.ms; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self' https://www.youtube.com https://s.ytimg.com https://*.contentsquare.net https://*.contentsquare.com https://*.heapanalytics.com https://*.clarity.ms; connect-src 'self' https://*.contentsquare.net https://*.contentsquare.com https://*.heapanalytics.com https://*.clarity.ms; font-src 'self' https://fonts.gstatic.com; frame-src https://www.youtube-nocookie.com https://www.youtube.com; object-src 'none'; base-uri 'self'; form-action 'self'" always;

    location /health {
        add_header Content-Type text/plain;
        add_header X-Content-Type-Options "nosniff" always;
        return 200 "ok";
    }

    # API → Express backend (same container, localhost). Preserves cookies
    # and the real client IP for the rate limiter.
    location /api/ {
        # add_header does not inherit into a location with its own add_header,
        # so re-declare the key security headers on API responses too.
        add_header X-Content-Type-Options "nosniff" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # service worker — exact-match beats the regex below. The browser's SW
    # update check GETs this exact unhashed URL; a long-lived cache here would
    # freeze updates for older browsers (modern ones bypass HTTP cache for the
    # top-level SW script, but no-cache is the correct contract regardless).
    # workbox-*.js stays under the immutable rule below — it IS content-hashed.
    location = /sw.js {
        add_header Cache-Control "no-cache" always;
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # vite-hashed bundles + self-hosted fonts — immutable
    location ~* \.(js|css|woff2)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # catalog JPEGs: serve a smaller .webp sibling to browsers that accept it,
    # transparently falling back to the original jpg (zero markup change). The
    # explicit types{} guarantees the correct Content-Type for whichever is served.
    location ~* ^/assets/.+\.jpe?g$ {
        types { image/jpeg jpg jpeg; image/webp webp; }
        add_header Vary Accept;
        add_header Cache-Control "public, max-age=604800";
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri$webp_suffix $uri =404;
    }

    # catalog imagery keeps stable names — 7d cache
    location /assets/ {
        add_header Cache-Control "public, max-age=604800";
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # SPA fallback for react-router; HTML must never go stale after a deploy
    location / {
        add_header Cache-Control "no-cache" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        # style-src 'unsafe-inline' kept intentionally — see the rationale on the
        # server-level CSP above (dynamic inline style attrs; script-src stays strict).
        add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https://*.contentsquare.net https://*.contentsquare.com https://*.clarity.ms; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self' https://www.youtube.com https://s.ytimg.com https://*.contentsquare.net https://*.contentsquare.com https://*.heapanalytics.com https://*.clarity.ms; connect-src 'self' https://*.contentsquare.net https://*.contentsquare.com https://*.heapanalytics.com https://*.clarity.ms; font-src 'self' https://fonts.gstatic.com; frame-src https://www.youtube-nocookie.com https://www.youtube.com; object-src 'none'; base-uri 'self'; form-action 'self'" always;
        # __fallback.html = the home shell minus its LCP hero preload +
        # noindex (written by scripts/prerender.mjs) — non-prerendered routes
        # (my-list, watch/*, auth…) must not preload the home hero still.
        try_files $uri $uri/ /__fallback.html;
    }
}
