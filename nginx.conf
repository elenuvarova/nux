# webp content-negotiation: pick a .webp sibling when the browser accepts it
map $http_accept $webp_suffix {
    default "";
    "~*webp" ".webp";
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # gzip
    gzip on;
    gzip_vary on;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/xml;
    gzip_min_length 1024;

    # security headers (repeat inside any location that sets its own add_header)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' https://www.youtube.com https://s.ytimg.com; font-src 'self'; frame-src https://www.youtube-nocookie.com https://www.youtube.com; object-src 'none'; base-uri 'self'; form-action 'self'" always;

    location /health {
        add_header Content-Type text/plain;
        add_header X-Content-Type-Options "nosniff" always;
        return 200 "ok";
    }

    # API → Express backend (same container, localhost). Preserves cookies
    # and the real client IP for the rate limiter.
    location /api/ {
        # add_header does not inherit into a location with its own add_header,
        # so re-declare the key security headers on API responses too.
        add_header X-Content-Type-Options "nosniff" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # vite-hashed bundles + self-hosted fonts — immutable
    location ~* \.(js|css|woff2)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # catalog JPEGs: serve a smaller .webp sibling to browsers that accept it,
    # transparently falling back to the original jpg (zero markup change). The
    # explicit types{} guarantees the correct Content-Type for whichever is served.
    location ~* ^/assets/.+\.jpe?g$ {
        types { image/jpeg jpg jpeg; image/webp webp; }
        add_header Vary Accept;
        add_header Cache-Control "public, max-age=604800";
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri$webp_suffix $uri =404;
    }

    # catalog imagery keeps stable names — 7d cache
    location /assets/ {
        add_header Cache-Control "public, max-age=604800";
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # SPA fallback for react-router; HTML must never go stale after a deploy
    location / {
        add_header Cache-Control "no-cache" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' https://www.youtube.com https://s.ytimg.com; font-src 'self'; frame-src https://www.youtube-nocookie.com https://www.youtube.com; object-src 'none'; base-uri 'self'; form-action 'self'" always;
        try_files $uri $uri/ /index.html;
    }
}
