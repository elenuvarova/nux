server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # gzip
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # security headers (repeat inside any location that sets its own add_header)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' https://www.youtube.com https://s.ytimg.com; font-src 'self'; frame-src https://www.youtube-nocookie.com https://www.youtube.com" always;

    location /health {
        add_header Content-Type text/plain;
        add_header X-Content-Type-Options "nosniff" always;
        return 200 "ok";
    }

    # vite-hashed bundles + self-hosted fonts — immutable
    location ~* \.(js|css|woff2)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # catalog imagery keeps stable names — 7d cache
    location /assets/ {
        add_header Cache-Control "public, max-age=604800";
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # SPA fallback for react-router; HTML must never go stale after a deploy
    location / {
        add_header Cache-Control "no-cache" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' https://www.youtube.com https://s.ytimg.com; font-src 'self'; frame-src https://www.youtube-nocookie.com https://www.youtube.com" always;
        try_files $uri $uri/ /index.html;
    }
}
