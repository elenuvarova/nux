server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # gzip
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # security headers (repeat inside any location that sets its own add_header)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; font-src 'self'" always;

    location /health {
        add_header Content-Type text/plain;
        add_header X-Content-Type-Options "nosniff" always;
        return 200 "ok";
    }

    # build bundles + catalog imagery share /assets/ — 7d cache
    # (vite-hashed files rotate names; posters keep names, so no immutable)
    location /assets/ {
        add_header Cache-Control "public, max-age=604800";
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # SPA fallback for react-router
    location / {
        try_files $uri $uri/ /index.html;
    }
}
