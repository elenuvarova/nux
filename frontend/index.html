<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>NUX — Cinema for Curious Minds</title>
    <meta
      name="description"
      content="An editorial home for films, documentaries, games and courses — chosen by people, not an algorithm."
    />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- PWA: manifest + theme-color are injected by vite-plugin-pwa; iOS needs these by hand -->
    <link rel="apple-touch-icon" href="/icon-180.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="NUX" />
    <!-- LCP preloads are injected per-route by scripts/prerender.mjs (the home
         hero preload used to live here, which wasted ~66-150KB on every
         non-home cold load — routes without a prerendered file now fall back
         to dist/__fallback.html, which carries no preload). -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="NUX" />
    <meta property="og:title" content="NUX — Cinema for Curious Minds" />
    <meta
      property="og:description"
      content="An editorial home for films, documentaries, games and courses — chosen by people, not an algorithm."
    />
    <meta property="og:url" content="https://app.nux.ontwrpn.com/" />
    <meta property="og:image" content="https://app.nux.ontwrpn.com/og.jpg" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="NUX — Cinema for Curious Minds" />
    <meta
      name="twitter:description"
      content="An editorial home for films, documentaries, games and courses — chosen by people, not an algorithm."
    />
    <meta name="twitter:image" content="https://app.nux.ontwrpn.com/og.jpg" />
    <!-- Self-referential default; usePageTitle rewrites this per route at runtime -->
    <link rel="canonical" href="https://app.nux.ontwrpn.com/" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
