<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NUX — Cinema for Curious Minds</title>
    <meta
      name="description"
      content="An editorial streaming platform for films, documentaries, games and courses — curated by editors who care."
    />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- PWA: manifest + theme-color are injected by vite-plugin-pwa; iOS needs these by hand -->
    <link rel="apple-touch-icon" href="/icon-180.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="NUX" />
    <!-- LCP: the home hero backdrop is referenced from JS — preload it so the
         request starts with the HTML, not after the bundle executes -->
    <link rel="preload" as="image" href="/assets/stills/still-lawrence-of-arabia-2.jpg" fetchpriority="high" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="NUX" />
    <meta property="og:title" content="NUX — Cinema for Curious Minds" />
    <meta
      property="og:description"
      content="An editorial streaming platform for films, documentaries, games and courses — curated by editors who care."
    />
    <meta property="og:url" content="https://app.nux.ontwrpn.com/" />
    <meta property="og:image" content="https://app.nux.ontwrpn.com/og.jpg" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="NUX — Cinema for Curious Minds" />
    <meta
      name="twitter:description"
      content="An editorial streaming platform for films, documentaries, games and courses — curated by editors who care."
    />
    <meta name="twitter:image" content="https://app.nux.ontwrpn.com/og.jpg" />
    <!-- Self-referential default; usePageTitle rewrites this per route at runtime -->
    <link rel="canonical" href="https://app.nux.ontwrpn.com/" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
