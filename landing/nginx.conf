# Serve poster-X.jpg.webp to webp-capable browsers, plain jpg otherwise.
# (map lives in http context — conf.d files are included inside http{}.)
map $http_accept $webp_suffix {
  default "";
  "~*image/webp" ".webp";
}

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_comp_level 5;
  gzip_min_length 1024;
  gzip_types text/css application/javascript application/json image/svg+xml;

  # Security headers — inherited by the SPA document (the `/` location sets no
  # add_header of its own). Asset locations below set their own headers and so
  # don't inherit these, which is fine for static images/JS.
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  # Microsoft Clarity (analytics) loads from clarity.ms and posts session data
  # back to it — allowed in script-src/connect-src/img-src, mirroring the app.
  add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https://*.clarity.ms; style-src 'self' 'unsafe-inline'; font-src 'self'; script-src 'self' https://*.clarity.ms; connect-src 'self' https://*.clarity.ms; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;

  # Posters + stills — content-negotiate webp, long-lived.
  location ~* ^/assets/(posters|stills)/.+\.jpe?g$ {
    try_files $uri$webp_suffix $uri =404;
    expires 1y;
    add_header Cache-Control "public, immutable";
    add_header Vary "Accept";
    add_header X-Content-Type-Options "nosniff" always;
  }

  # Hashed build assets + other static — long-lived.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    add_header X-Content-Type-Options "nosniff" always;
    try_files $uri =404;
  }

  # SPA fallback. index.html must NOT be cached or deploys won't show until a hard
  # refresh — revalidate it every load (the hashed assets above stay immutable).
  # NOTE: add_header here stops header inheritance, so the security headers are repeated.
  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https://*.clarity.ms; style-src 'self' 'unsafe-inline'; font-src 'self'; script-src 'self' https://*.clarity.ms; connect-src 'self' https://*.clarity.ms; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;
  }
}
