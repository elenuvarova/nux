name: CI

# Gate before the Coolify auto-deploy webhook ships main: tests + build + a
# catalog-drift check must pass. (Coolify deploys on push regardless, so treat a
# red check here as "revert or fix-forward fast".)
on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm test

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build

  catalog-drift:
    # backend/data/films.js is a generated projection of the frontend catalog;
    # fail if someone changed the catalog without re-running the generator
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/build-films.mjs
        working-directory: backend
      - name: films.js must match the catalog
        run: git diff --exit-code backend/data/films.js
