name: Docker CI

# Build the REAL production image and smoke-test it end-to-end against a real
# Postgres (the prod path), via nginx serving the SPA + proxying /api → node →
# the DB-aware /api/health. The image carries no sqlite3 (prod is Postgres-only).
on:
  push:
    branches: [main]
  pull_request:

# Cancel a superseded image build/smoke when a newer commit lands on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-smoke:
    runs-on: ubuntu-latest
    # Docker build + Postgres service + smoke loop — a bit more headroom than the
    # plain Node jobs, but still bounded so a hung container can't burn minutes.
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: nux
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Build the production image
        run: docker build -t nux:ci .

      - name: Run the container against the Postgres service
        run: |
          docker run -d --name nux-ci --network host \
            -e DATABASE_URL="postgres://postgres:ci@localhost:5432/nux" \
            nux:ci

      - name: Smoke /api/health through nginx
        run: |
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w '%{http_code}' http://localhost/api/health || true)
            if [ "$code" = "200" ]; then echo "healthy after ${i} tries"; exit 0; fi
            sleep 2
          done
          echo "::error::/api/health never returned 200"
          docker logs nux-ci || true
          exit 1

      - name: Smoke the SPA root
        run: |
          code=$(curl -s -o /dev/null -w '%{http_code}' http://localhost/)
          test "$code" = "200" || { echo "::error::SPA root returned $code"; exit 1; }

      - name: Tear down
        if: always()
        run: docker rm -f nux-ci || true
